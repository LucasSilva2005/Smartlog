name: smartlife
description: "Sistema inteligente para monitoramento de logística e operações."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  google_maps_flutter: ^2.12.3
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0
  http: ^1.5.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/Smartlog.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/Smartlog.png"